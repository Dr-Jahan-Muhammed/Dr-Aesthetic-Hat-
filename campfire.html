<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>🔥 Campfire Night | Dr Aesthetic Hat</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
overflow:hidden;
font-family:Inter,sans-serif;
}

#campfireVideo{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

object-fit:cover;

}

.overlay{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.35);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

color:white;

padding:30px;

}

h1{

font-size:2.5rem;

font-weight:300;

margin-bottom:15px;

}

p{

font-size:1rem;

opacity:.9;

max-width:320px;

line-height:1.7;

}

.enterBtn{

margin-top:25px;

padding:16px 30px;

border:none;

border-radius:16px;

background:#f97316;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

}

.backBtn{

position:fixed;

top:20px;

left:20px;

z-index:999;

text-decoration:none;

background:rgba(0,0,0,.4);

backdrop-filter:blur(10px);

padding:12px 18px;

border-radius:14px;

color:white;

font-size:14px;

}

.hidden{
display:none;
}

</style></head><body><a href="mind.html" class="backBtn">← Back

</a><video
id="campfireVideo"
autoplay
muted
loop
playsinline
controls
style="
width:100%;
height:100vh;
object-fit:cover;
">

<source
src="videos/campfire.mp4"
type="video/mp4">

</video><div
id="welcomeScreen"
class="overlay"><h1>🔥 Campfire Night

</h1><p>Feel the warmth.

Watch the flames dance.

Let the night sky slow your thoughts.

Nothing else needs your attention right now.

</p><button
class="enterBtn"
onclick="enterCampfire()">

Enter Campfire

</button></div><script>

function enterCampfire(){

const video =
document.getElementById(
"campfireVideo"
);

video.muted = false;

video.play();

document
.getElementById(
"welcomeScreen"
)
.classList.add(
"hidden"
);

}

</script></body></html>
