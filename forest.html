<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Forest Retreat</title>

<style>

body{

margin:0;

overflow:hidden;

background:black;

font-family:Arial,sans-serif;

}

video{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

object-fit:cover;

}

.overlay{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

background:rgba(0,0,0,.25);

color:white;

text-align:center;

}

h1{

font-size:2rem;

margin-bottom:10px;

}

button{

padding:14px 24px;

border:none;

border-radius:12px;

background:#14b8a6;

color:white;

font-size:16px;

margin-top:15px;

}

.back{

position:fixed;

top:20px;

left:20px;

text-decoration:none;

color:white;

font-size:18px;

background:rgba(0,0,0,.4);

padding:10px 15px;

border-radius:10px;

}

</style>

</head>

<body>

<video autoplay muted loop playsinline>

<source src="videos/forest.mp4" type="video/mp4">

</video>

<audio id="forestAudio" loop>

<source src="audio/forest.mp3" type="audio/mpeg">

</audio>

<a href="mind.html" class="back">

← Back

</a>

<div class="overlay">

<h1>🌲 Forest Retreat</h1>

<p>Take a breath.</p>

<button onclick="startForest()">

Enter Forest

</button>

</div>

<script>

function startForest(){

document
.getElementById("forestAudio")
.play();

}

</script>

</body>

</html>
